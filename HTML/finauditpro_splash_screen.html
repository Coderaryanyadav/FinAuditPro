<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinAuditPro - Splash Screen</title>
    <!-- Using Inter font for a clean, modern, enterprise feel -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                            800: '#075985',
                            900: '#0c4a6e',
                        }
                    },
                    animation: {
                        'fade-in': 'fadeIn 1s ease-out forwards',
                        'slide-up': 'slideUp 0.8s ease-out forwards',
                        'progress': 'progress 3s ease-in-out infinite',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        progress: {
                            '0%': { transform: 'translateX(-100%)' },
                            '50%': { transform: 'translateX(0)' },
                            '100%': { transform: 'translateX(100%)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* Subtly animated gradient background for premium feel */
            background: linear-gradient(135deg, #ffffff 0%, #f0f9ff 50%, #e0f2fe 100%);
            background-size: 200% 200%;
            animation: gradientMove 8s ease infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.05), 0 0 0 1px rgba(0, 0, 0, 0.02);
        }

        .logo-shadow {
            filter: drop-shadow(0 10px 15px rgba(2, 132, 199, 0.15));
        }

        .stagger-1 { animation-delay: 0.1s; opacity: 0; }
        .stagger-2 { animation-delay: 0.3s; opacity: 0; }
        .stagger-3 { animation-delay: 0.5s; opacity: 0; }
        .stagger-4 { animation-delay: 0.7s; opacity: 0; }

        /* Custom progress bar clipping for smooth animation */
        .progress-bar-container {
            overflow: hidden;
            position: relative;
        }
        
        /* Animated SVG elements */
        .circuit-path {
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            animation: drawCircuit 2s ease-in-out forwards;
            animation-delay: 0.5s;
        }
        
        @keyframes drawCircuit {
            to { stroke-dashoffset: 0; }
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen text-slate-800 antialiased selection:bg-brand-100 selection:text-brand-900">

    <!-- Simulating the desktop app window bounds. In reality, the OS handles the window frame. -->
    <div class="relative w-full max-w-[1920px] aspect-video max-h-screen mx-auto flex flex-col items-center justify-center overflow-hidden">
        
        <!-- Decorative Background Elements -->
        <div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0">
            <div class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] rounded-full bg-brand-100/40 blur-[100px] animate-pulse-slow"></div>
            <div class="absolute bottom-[10%] -right-[10%] w-[60%] h-[60%] rounded-full bg-brand-50/60 blur-[120px] animate-pulse-slow" style="animation-delay: 1.5s;"></div>
        </div>

        <!-- Central Content Panel -->
        <main class="relative z-10 flex flex-col items-center p-12 md:p-24 rounded-3xl animate-slide-up stagger-1">
            
            <!-- FinAuditPro Logo (Shield + Chart + AI Circuit + Document) -->
            <div class="mb-10 animate-slide-up stagger-2 logo-shadow">
                <svg width="140" height="140" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-28 h-28 md:w-36 md:h-36">
                    <!-- Background Shield/Document Shape -->
                    <path d="M60 5L100 20V55C100 82.5 83.5 107 60 115C36.5 107 20 82.5 20 55V20L60 5Z" fill="url(#paint0_linear)" fill-opacity="0.1"/>
                    <path d="M60 5L100 20V55C100 82.5 83.5 107 60 115C36.5 107 20 82.5 20 55V20L60 5Z" stroke="url(#paint1_linear)" stroke-width="3" stroke-linejoin="round"/>
                    
                    <!-- Chart Bars (Audit/Financial) -->
                    <rect x="42" y="70" width="8" height="20" rx="2" fill="#0ea5e9"/>
                    <rect x="56" y="55" width="8" height="35" rx="2" fill="#0369a1"/>
                    <rect x="70" y="40" width="8" height="50" rx="2" fill="#0c4a6e"/>
                    
                    <!-- AI Circuit Nodes & Paths -->
                    <circle cx="60" cy="35" r="4" fill="#0ea5e9"/>
                    <circle cx="35" cy="50" r="3" fill="#0284c7"/>
                    <circle cx="85" cy="50" r="3" fill="#0284c7"/>
                    
                    <path d="M38 50L56 35" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round" class="circuit-path"/>
                    <path d="M82 50L64 35" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round" class="circuit-path"/>
                    <path d="M60 35V25" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round" class="circuit-path"/>

                    <!-- Document Lines -->
                    <line x1="35" y1="30" x2="45" y2="30" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
                    <line x1="75" y1="30" x2="85" y2="30" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>

                    <defs>
                        <linearGradient id="paint0_linear" x1="60" y1="5" x2="60" y2="115" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#0EA5E9"/>
                            <stop offset="1" stop-color="#0369A1"/>
                        </linearGradient>
                        <linearGradient id="paint1_linear" x1="20" y1="5" x2="100" y2="115" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#38BDF8"/>
                            <stop offset="1" stop-color="#0C4A6E"/>
                        </linearGradient>
                    </defs>
                </svg>
            </div>

            <!-- Application Name -->
            <div class="text-center animate-slide-up stagger-3">
                <h1 class="text-4xl md:text-6xl font-bold tracking-tight text-slate-900 mb-3 flex items-center justify-center">
                    FinAudit<span class="text-brand-600 font-light">Pro</span>
                </h1>
                
                <!-- Tagline -->
                <p class="text-lg md:text-xl text-slate-500 font-medium tracking-wide">
                    Smart Financial Audit Assistant
                </p>
            </div>

            <!-- Loading Indicator Container -->
            <div class="mt-20 w-full max-w-md animate-slide-up stagger-4 flex flex-col items-center">
                <!-- Status Text -->
                <div class="flex justify-between w-full text-xs font-semibold text-slate-400 mb-2 uppercase tracking-widest px-1">
                    <span id="loading-text">Initializing AI Engine...</span>
                    <span id="loading-percentage">0%</span>
                </div>
                
                <!-- Progress Bar -->
                <div class="w-full h-1.5 bg-slate-200 rounded-full progress-bar-container shadow-inner">
                    <!-- Indeterminate sweeping bar -->
                    <div class="absolute top-0 left-0 h-full w-1/3 bg-brand-500 rounded-full opacity-50 animate-progress"></div>
                    <!-- Determinate filling bar (controlled by JS) -->
                    <div id="progress-fill" class="absolute top-0 left-0 h-full bg-gradient-to-r from-brand-600 to-brand-400 rounded-full transition-all duration-300 ease-out w-0 shadow-[0_0_10px_rgba(14,165,233,0.5)]"></div>
                </div>
            </div>
        </main>

        <!-- Footer Version & Security Info -->
        <footer class="absolute bottom-10 w-full flex flex-col items-center justify-center text-xs text-slate-400 animate-fade-in" style="animation-delay: 1s;">
            <div class="flex items-center space-x-2 mb-1">
                <svg class="w-3.5 h-3.5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                </svg>
                <span class="tracking-wider uppercase font-semibold text-[10px]">Secure AI-Powered Audit Platform</span>
            </div>
            <div class="font-medium">Version 1.0.42 (Build 2026.07)</div>
            <div class="mt-2 text-[10px] text-slate-300">© 2026 FinAudit Systems Inc. All rights reserved.</div>
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const progressFill = document.getElementById('progress-fill');
            const percentageText = document.getElementById('loading-percentage');
            const loadingText = document.getElementById('loading-text');
            
            const loadingStates = [
                { progress: 15, text: "Loading Core Modules...", delay: 500 },
                { progress: 35, text: "Establishing Secure Connection...", delay: 1200 },
                { progress: 60, text: "Initializing Machine Learning Models...", delay: 2000 },
                { progress: 85, text: "Verifying Compliance Rulesets...", delay: 3000 },
                { progress: 100, text: "Ready.", delay: 4000 }
            ];

            // Simulate the loading process typical of a heavy desktop application
            loadingStates.forEach(state => {
                setTimeout(() => {
                    progressFill.style.width = `${state.progress}%`;
                    percentageText.textContent = `${state.progress}%`;
                    loadingText.textContent = state.text;

                    // Optional: If this were a real app, at 100% you would trigger the main window to open
                    if (state.progress === 100) {
                        setTimeout(() => {
                           // Example: Close splash, show main app
                           // window.location.href = 'main_app.html';
                           console.log("Splash screen finished. Launching FinAuditPro.");
                        }, 500);
                    }
                }, state.delay);
            });
            
            // Handle minor window resizing to maintain aspect ratio logic if needed
            // The tailwind classes (aspect-video) largely handle this, but ensures smooth text scaling.
        });
    </script>
</body>
</html>
