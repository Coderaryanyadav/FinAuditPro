name: Build Cross-Platform Desktop Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-executable:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 sqlalchemy ollama requests pypdf pdfplumber matplotlib pyinstaller cryptography pydantic

      - name: Run Subsystem Unit Tests
        run: |
          python -m unittest discover -s tests

      - name: Build Desktop Executable via PyInstaller
        run: |
          pyinstaller FinAuditPro.spec

      - name: Package macOS App / DMG
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p dist/dmg
          cp -R dist/FinAuditPro dist/dmg/
          hdiutil create -volname FinAuditPro -srcfolder dist/dmg -ov -format UDZO dist/FinAuditPro-macOS.dmg

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: FinAuditPro-${{ matrix.os }}
          path: dist/
