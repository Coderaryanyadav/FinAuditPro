<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinAuditPro - Test App</title>
    <meta name="description" content="A premium test application for FinAuditPro">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <nav class="sidebar">
            <div class="logo-container">
                <div class="logo"></div>
                <h2>FinAuditPro</h2>
            </div>
            <ul class="nav-links">
                <li class="active"><a href="#" id="nav-dashboard">Dashboard</a></li>
                <li><a href="#" id="nav-analytics">Analytics</a></li>
                <li><a href="#" id="nav-settings">Settings</a></li>
            </ul>
        </nav>
        
        <main class="main-content">
            <header>
                <h1>Welcome Back, Admin</h1>
                <div class="user-profile">
                    <div class="avatar">A</div>
                </div>
            </header>

            <section class="dashboard-widgets">
                <div class="widget card glass-effect">
                    <h3>Total Audits</h3>
                    <p class="value">1,248</p>
                    <span class="trend positive">↑ 12% from last month</span>
                </div>
                <div class="widget card glass-effect">
                    <h3>Risk Alerts</h3>
                    <p class="value">34</p>
                    <span class="trend negative">↓ 5% from last month</span>
                </div>
                <div class="widget card glass-effect">
                    <h3>Pending Reviews</h3>
                    <p class="value">12</p>
                    <span class="trend neutral">Same as last week</span>
                </div>
            </section>

            <section class="main-panel card glass-effect">
                <h2>Interactive Test Component</h2>
                <p>Click the button below to test the dynamic interaction.</p>
                <button id="test-btn" class="primary-btn">Run Analysis</button>
                <div id="result-container" class="hidden">
                    <div class="loader"></div>
                    <p id="result-text"></p>
                </div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
