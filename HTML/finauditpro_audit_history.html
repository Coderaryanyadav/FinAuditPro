<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinAuditPro - Audit History</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            50: '#f0f9ff', 100: '#e0f2fe', 500: '#0ea5e9',
                            600: '#0284c7', 700: '#0369a1', 900: '#0c4a6e',
                        },
                        slate: {
                            50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0',
                            300: '#cbd5e1', 400: '#94a3b8', 500: '#64748b',
                            600: '#475569', 700: '#334155', 800: '#1e293b', 900: '#0f172a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; overflow: hidden; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .nav-item { transition: all 0.2s ease; }
    </style>
</head>
<body class="text-slate-800 antialiased h-screen w-screen flex">

    <aside class="w-[260px] bg-white border-r border-slate-200 flex flex-col h-full flex-shrink-0 shadow-[4px_0_24px_rgba(0,0,0,0.02)]">
        <div class="h-16 flex flex-col justify-center px-6 border-b border-slate-100">
            <div class="flex items-center space-x-2">
                <svg width="24" height="24" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M60 5L100 20V55C100 82.5 83.5 107 60 115C36.5 107 20 82.5 20 55V20L60 5Z" fill="#0EA5E9" fill-opacity="0.1"/>
                    <path d="M60 5L100 20V55C100 82.5 83.5 107 60 115C36.5 107 20 82.5 20 55V20L60 5Z" stroke="#0EA5E9" stroke-width="8" stroke-linejoin="round"/>
                </svg>
                <span class="text-lg font-bold text-slate-900">FinAudit<span class="text-brand-600 font-light">Pro</span></span>
            </div>
        </div>
        <div class="flex-1 overflow-y-auto py-4 px-3 space-y-1">
            <p class="px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Audit Workspace</p>
            <a href="#" class="nav-item flex items-center px-3 py-2.5 text-slate-600 hover:bg-slate-50 rounded-lg"><span class="font-medium text-sm">Dashboard</span></a>
            <p class="px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2 mt-6">Records</p>
            <a href="#" class="nav-item flex items-center px-3 py-2.5 bg-brand-50 text-brand-700 rounded-lg border-l-4 border-brand-600"><span class="font-medium text-sm">Audit History</span></a>
            <a href="#" class="nav-item flex items-center px-3 py-2.5 text-slate-600 hover:bg-slate-50 rounded-lg"><span class="font-medium text-sm">Reports</span></a>
        </div>
    </aside>

    <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
        <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8">
            <h1 class="text-lg font-bold text-slate-900">Audit History</h1>
            <div class="flex space-x-3">
                <button class="px-4 py-2 bg-white border border-slate-300 rounded-lg text-sm font-medium hover:bg-slate-50">View Timeline</button>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-8">
            <!-- Filter Bar -->
            <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-soft mb-6 flex space-x-4 items-center">
                <div class="flex-1">
                    <label class="text-[10px] font-bold text-slate-500 uppercase">Date Range</label>
                    <select class="block w-full mt-1 border-slate-200 border rounded-lg p-2 text-sm bg-slate-50">
                        <option>Last 30 Days</option>
                        <option>Last 90 Days</option>
                        <option>Last Year</option>
                    </select>
                </div>
                <div class="flex-1">
                    <label class="text-[10px] font-bold text-slate-500 uppercase">Client</label>
                    <select class="block w-full mt-1 border-slate-200 border rounded-lg p-2 text-sm bg-slate-50">
                        <option>All Clients</option>
                        <option>TechCorp Solutions</option>
                    </select>
                </div>
                <div class="flex-1">
                    <label class="text-[10px] font-bold text-slate-500 uppercase">Status</label>
                    <select class="block w-full mt-1 border-slate-200 border rounded-lg p-2 text-sm bg-slate-50">
                        <option>All Statuses</option>
                        <option>Completed</option>
                        <option>In Progress</option>
                    </select>
                </div>
            </div>

            <div class="bg-white rounded-xl border border-slate-200 shadow-soft overflow-hidden">
                <table class="min-w-full divide-y divide-slate-200">
                    <thead class="bg-slate-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-[10px] font-bold text-slate-500 uppercase tracking-wider">Client</th>
                            <th class="px-6 py-3 text-left text-[10px] font-bold text-slate-500 uppercase tracking-wider">Audit Date</th>
                            <th class="px-6 py-3 text-left text-[10px] font-bold text-slate-500 uppercase tracking-wider">Auditor</th>
                            <th class="px-6 py-3 text-left text-[10px] font-bold text-slate-500 uppercase tracking-wider">Status</th>
                            <th class="px-6 py-3 text-right text-[10px] font-bold text-slate-500 uppercase tracking-wider">Risk Score</th>
                            <th class="px-6 py-3 text-center text-[10px] font-bold text-slate-500 uppercase tracking-wider">Report</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-200 text-sm">
                        <tr>
                            <td class="px-6 py-4 font-semibold text-slate-900">TechCorp Solutions</td>
                            <td class="px-6 py-4">July 12, 2026</td>
                            <td class="px-6 py-4">CA User</td>
                            <td class="px-6 py-4"><span class="px-2 py-1 rounded bg-emerald-50 text-emerald-700 text-[10px] font-bold">COMPLETED</span></td>
                            <td class="px-6 py-4 text-right">18%</td>
                            <td class="px-6 py-4 text-center"><button class="text-brand-600 font-medium">Download</button></td>
                        </tr>
                        <tr>
                            <td class="px-6 py-4 font-semibold text-slate-900">Global Impex</td>
                            <td class="px-6 py-4">June 28, 2026</td>
                            <td class="px-6 py-4">Senior Partner</td>
                            <td class="px-6 py-4"><span class="px-2 py-1 rounded bg-amber-50 text-amber-700 text-[10px] font-bold">IN PROGRESS</span></td>
                            <td class="px-6 py-4 text-right">45%</td>
                            <td class="px-6 py-4 text-center"><button class="text-slate-400">N/A</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
</body>
</html>
